<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiShows FIFA Live Schedule</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #000000;
            color: #ffffff;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        /* ব্যানার স্টাইল */
        .banner {
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            display: none; /* শুরুতে হাইড থাকবে, JS দিয়ে শো হবে */
        }
        .upcoming {
            background: linear-gradient(135deg, rgba(234, 179, 8, 0.1) 0%, rgba(234, 179, 8, 0.02) 100%);
            border: 1px solid rgba(234, 179, 8, 0.25);
        }
        .live {
            background: linear-gradient(135deg, rgba(225, 29, 72, 0.1) 0%, rgba(225, 29, 72, 0.02) 100%);
            border: 1px solid rgba(225, 29, 72, 0.25);
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .badge-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-upcoming { background: #eab308; box-shadow: 0 0 10px #eab308; }
        .dot-live { background: #E11D48; box-shadow: 0 0 10px #E11D48; }
        
        .badge-text { font-weight: 800; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
        .sub-title { color: #888888; font-size: 11px; font-weight: 600; }
        h2 { font-size: 18px; font-weight: 700; margin: 0 0 5px 0; }
        p { color: #cccccc; font-size: 12px; margin: 0; font-weight: 500; }
        
        .timer-badge {
            background: rgba(234, 179, 8, 0.15);
            color: #eab308;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        /* শিডিউল লিস্ট স্টাইল */
        .section-title {
            color: #ffffff;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .list-container { display: flex; flex-direction: column; gap: 10px; }
        .match-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, rgba(35, 35, 35, 0.4) 0%, rgba(20, 20, 20, 0.6) 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 12px 14px;
            gap: 10px;
        }
        .match-name { color: #ffffff; font-size: 13px; font-weight: 700; }
        .match-group { color: #777777; font-size: 11px; font-weight: 500; }
        .time-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            padding: 5px 10px;
            border-radius: 6px;
            text-align: right;
            min-width: 115px;
        }
        .status { color: #aaaaaa; font-size: 11px; font-weight: 800; display: block; }
        .time { color: #ffffff; font-size: 11px; font-weight: 700; display: block; }
        .date { color: #999999; font-size: 9px; font-weight: 600; display: block; }
    </style>
</head>
<body>

<div class="container">

    <div id="upcoming-banner" class="banner upcoming">
        <div class="header-row">
            <div class="badge-box">
                <span class="dot dot-upcoming"></span>
                <span class="badge-text" style="color: #eab308;">UPCOMING MATCH</span>
            </div>
            <span class="sub-title">FIFA World Cup 2026</span>
        </div>
        <h2 id="upcoming-teams">Loading...</h2>
        <div style="display: flex; align-items: center; gap: 10px; margin-top: 8px;">
            <p id="upcoming-details">Group Stage</p>
            <span id="countdown-text" class="timer-badge">Calculating...</span>
        </div>
    </div>

    <div id="live-banner" class="banner live">
        <div class="header-row">
            <div class="badge-box">
                <span class="dot dot-live"></span>
                <span class="badge-text" style="color: #E11D48;">LIVE NOW</span>
            </div>
            <span class="sub-title">FIFA World Cup 2026</span>
        </div>
        <h2 id="live-teams">Loading...</h2>
        <p>Group Stage • Live Streaming Active</p>
    </div>

    <div style="margin-top: 20px;">
        <div class="section-title">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z" fill="#E11D48"/></svg>
            Upcoming Match Schedule
        </div>
        
        <div class="list-container" id="schedule-list"></div>
    </div>

</div>

<script>
// গুগলের অফিশিয়াল কমপ্লিট ও কারেন্ট শিডিউল (UTC ফরম্যাটে, যা পৃথিবীর যেকোনো দেশ থেকে লোকাল টাইমে দেখাবে)
const matches = [
    { teams: "Türkiye 🇹🇷 vs 🇵🇾 Paraguay", group: "Group D", time: "2026-06-20T03:00:00Z" }, // বর্তমানে চলমান ম্যাচটি যুক্ত করা হলো
    { teams: "Ecuador 🇪🇨 vs 🇨🇼 Curaçao", group: "Group E", time: "2026-06-20T09:00:00Z" },
    { teams: "Netherlands 🇳🇱 vs 🇸🇪 Sweden", group: "Group F", time: "2026-06-20T12:00:00Z" },
    { teams: "Tunisia 🇹🇳 vs 🇯🇵 Japan", group: "Group F", time: "2026-06-20T14:00:00Z" },
    { teams: "Germany 🇩🇪 vs 🇨🇮 Côte d'Ivoire", group: "Group E", time: "2026-06-20T16:00:00Z" },
    { teams: "Spain 🇪🇸 vs 🇸🇦 Saudi Arabia", group: "Group H", time: "2026-06-21T16:00:00Z" },
    { teams: "Belgium 🇧🇪 vs 🇮🇷 IR Iran", group: "Group G", time: "2026-06-21T19:00:00Z" },
    { teams: "Uruguay 🇺🇾 vs 🇨🇻 Cabo Verde", group: "Group H", time: "2026-06-21T22:00:00Z" },
    { teams: "New Zealand 🇳🇿 vs 🇪🇬 Egypt", group: "Group G", time: "2026-06-22T01:00:00Z" },
    { teams: "France 🇫🇷 vs 🇸🇳 Senegal", group: "Group I", time: "2026-06-22T19:00:00Z" },
    { teams: "Iraq 🇮🇶 vs 🇳🇴 Norway", group: "Group I", time: "2026-06-22T22:00:00Z" },
    { teams: "Argentina 🇦🇷 vs 🇩🇿 Algeria", group: "Group J", time: "2026-06-22T21:00:00Z" },
    { teams: "Austria 🇦🇹 vs 🇯🇴 Jordan", group: "Group J", time: "2026-06-22T24:00:00Z" },
    { teams: "Ghana 🇬🇭 vs 🇵🇦 Panama", group: "Group L", time: "2026-06-23T23:00:00Z" },
    { teams: "Uzbekistan 🇺🇿 vs 🇨🇴 Colombia", group: "Group K", time: "2026-06-24T02:00:00Z" },
    { teams: "Czechia 🇨🇿 vs 🇿🇦 South Africa", group: "Group A", time: "2026-06-24T16:00:00Z" },
    { teams: "Switzerland 🇨🇭 vs 🇧🇦 Bosnia and Herz.", group: "Group B", time: "2026-06-24T19:00:00Z" },
    { teams: "Canada 🇨🇦 vs 🇶🇦 Qatar", group: "Group B", time: "2026-06-24T22:00:00Z" },
    { teams: "Mexico 🇲🇽 vs 🇰🇷 Korea Republic", group: "Group A", time: "2026-06-24T24:00:00Z" },
    { teams: "Brazil 🇧🇷 vs 🏴󠁧󠁢󠁥󠁮󠁧󠁿 England", group: "Group C", time: "2026-06-25T21:00:00Z" },
    { teams: "Croatia 🇭🇷 vs 🇬🇭 Ghana", group: "Group L", time: "2026-06-26T00:00:00Z" },
    { teams: "Panama 🇵🇦 vs 🇨🇮 Côte d'Ivoire", group: "Group L", time: "2026-06-26T03:00:00Z" },
    { teams: "Portugal 🇵🇹 vs 🇨🇴 Colombia", group: "Group K", time: "2026-06-26T21:00:00Z" },
    { teams: "Uzbekistan 🇺🇿 vs 🇨🇩 DR Congo", group: "Group K", time: "2026-06-27T00:00:00Z" },
    { teams: "France 🇫🇷 vs 🇯🇵 Japan", group: "Group F", time: "2026-06-27T03:00:00Z" },
    { teams: "Spain 🇪🇸 vs 🇮🇹 Italy", group: "Group H", time: "2026-06-27T21:00:00Z" },
    { teams: "Round of 32 • Knockout Match 1", group: "Knockout Stage", time: "2026-06-28T20:30:00Z" },
    { teams: "Round of 32 • Knockout Match 2", group: "Knockout Stage", time: "2026-06-28T23:00:00Z" }
];

// ইউজারের স্থানীয় ডিভাইস ফরম্যাটে ডেটা কনভার্ট করার হেল্পার ফাংশন
function getLocalTimeDetails(isoString) {
    const dateObj = new Date(isoString);
    const displayTime = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
    const displayDate = dateObj.toLocaleDateString([], { month: 'short', day: 'numeric' });
    return { displayTime, displayDate };
}

function renderSchedule() {
    const listContainer = document.getElementById("schedule-list");
    if (!listContainer) return;
    listContainer.innerHTML = "";

    const now = new Date().getTime();

    matches.forEach(match => {
        const matchTime = new Date(match.time).getTime();
        // ম্যাচ শুরুর আগ পর্যন্ত তা নিচের শিডিউল তালিকায় দৃশ্যমান থাকবে
        if (matchTime > now) {
            const local = getLocalTimeDetails(match.time);
            listContainer.innerHTML += `
                <div class="match-card">
                    <div>
                        <div class="match-name">${match.teams}</div>
                        <div class="match-group">${match.group}</div>
                    </div>
                    <div class="time-box">
                        <span class="status">SCHEDULED</span>
                        <span class="time">${local.displayTime}</span>
                        <span class="date">${local.displayDate}</span>
                    </div>
                </div>
            `;
        }
    });
}

function updateLiveSystem() {
    const now = new Date().getTime();
    let currentLiveMatch = null;
    let nextUpcomingMatch = null;

    for (let i = 0; i < matches.length; i++) {
        const matchTime = new Date(matches[i].time).getTime();
        const matchEndTime = matchTime + (105 * 60 * 1000); // ম্যাচ ডিউরেশন ১০৫ মিনিট (১ ঘণ্টা ৪৫ মিনিট)

        if (now >= matchTime && now <= matchEndTime) {
            currentLiveMatch = matches[i];
            break;
        } else if (matchTime > now) {
            if (!nextUpcomingMatch) nextUpcomingMatch = matches[i];
        }
    }

    const liveBanner = document.getElementById("live-banner");
    const upcomingBanner = document.getElementById("upcoming-banner");

    if (currentLiveMatch) {
        upcomingBanner.style.display = "none";
        liveBanner.style.display = "block";
        document.getElementById("live-teams").innerText = currentLiveMatch.teams;
    } 
    else if (nextUpcomingMatch) {
        liveBanner.style.display = "none";
        upcomingBanner.style.display = "block";
        
        const local = getLocalTimeDetails(nextUpcomingMatch.time);
        
        document.getElementById("upcoming-teams").innerText = nextUpcomingMatch.teams;
        document.getElementById("upcoming-details").innerText = `${nextUpcomingMatch.group} • ${local.displayDate} at ${local.displayTime}`;

        const diff = new Date(nextUpcomingMatch.time).getTime() - now;
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("countdown-text").innerText = `Starts in: ${hours}h ${minutes}m ${seconds}s`;
    } else {
        liveBanner.style.display = "none";
        upcomingBanner.style.display = "none";
    }
}

// ইনিশিয়াল রান এবং টাইমার সেটআপ
renderSchedule();
setInterval(updateLiveSystem, 1000);
setInterval(renderSchedule, 60000);
updateLiveSystem();
</script>

</body>
</html>
