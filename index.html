<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiShows FIFA Live Schedule</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #000000;
            color: #ffffff;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        /* ব্যানার স্টাইল */
        .banner {
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            display: none; 
            transition: all 0.3s ease;
        }
        .upcoming {
            background: linear-gradient(135deg, rgba(234, 179, 8, 0.1) 0%, rgba(234, 179, 8, 0.02) 100%);
            border: 1px solid rgba(234, 179, 8, 0.25);
        }
        .live {
            background: linear-gradient(135deg, rgba(225, 29, 72, 0.1) 0%, rgba(225, 29, 72, 0.02) 100%);
            border: 1px solid rgba(225, 29, 72, 0.25);
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .badge-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-upcoming { background: #eab308; box-shadow: 0 0 10px #eab308; }
        .dot-live { background: #E11D48; box-shadow: 0 0 10px #E11D48; }
        
        .badge-text { font-weight: 800; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
        .sub-title { color: #888888; font-size: 11px; font-weight: 600; }
        h2 { font-size: 18px; font-weight: 700; margin: 0 0 5px 0; }
        p { color: #cccccc; font-size: 12px; margin: 0; font-weight: 500; }
        
        .timer-badge {
            background: rgba(234, 179, 8, 0.15);
            color: #eab308;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        /* শিডিউল লিস্ট স্টাইল */
        .section-title {
            color: #ffffff;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .list-container { display: flex; flex-direction: column; gap: 10px; }
        .match-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, rgba(35, 35, 35, 0.4) 0%, rgba(20, 20, 20, 0.6) 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 12px 14px;
            gap: 10px;
        }
        .match-name { color: #ffffff; font-size: 13px; font-weight: 700; }
        .match-group { color: #777777; font-size: 11px; font-weight: 500; }
        .time-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            padding: 5px 10px;
            border-radius: 6px;
            text-align: right;
            min-width: 115px;
        }
        .status { color: #aaaaaa; font-size: 11px; font-weight: 800; display: block; }
        .time { color: #ffffff; font-size: 11px; font-weight: 700; display: block; }
        .date { color: #999999; font-size: 9px; font-weight: 600; display: block; }
    </style>
</head>
<body>

<div class="container">

    <!-- UPCOMING BANNER -->
    <div id="upcoming-banner" class="banner upcoming">
        <div class="header-row">
            <div class="badge-box">
                <span class="dot dot-upcoming"></span>
                <span class="badge-text" style="color: #eab308;">UPCOMING MATCH</span>
            </div>
            <span class="sub-title">FIFA World Cup 2026</span>
        </div>
        <h2 id="upcoming-teams">Loading...</h2>
        <div style="display: flex; align-items: center; gap: 10px; margin-top: 8px;">
            <p id="upcoming-details">Match Details</p>
            <span id="countdown-text" class="timer-badge">Calculating...</span>
        </div>
    </div>

    <!-- LIVE BANNER -->
    <div id="live-banner" class="banner live">
        <div class="header-row">
            <div class="badge-box">
                <span class="dot dot-live"></span>
                <span class="badge-text" style="color: #E11D48;">LIVE NOW</span>
            </div>
            <span class="sub-title" id="live-meta">FIFA World Cup 2026</span>
        </div>
        <h2 id="live-teams">Loading...</h2>
        <p id="live-status-text">Live Streaming Active</p>
    </div>

    <!-- LIST SECTION -->
    <div style="margin-top: 20px;">
        <div class="section-title">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z" fill="#E11D48"/></svg>
            Fixtures & Live Schedule
        </div>
        <div class="list-container" id="schedule-list"></div>
    </div>

</div>

<script>
// নতুন ও আপডেটেড সম্পূর্ণ শিডিউল লিস্ট (বাংলাদেশ সময় অনুযায়ী কনভার্ট করা)
const matches = [
    // --- Sun, Jul 12 ---
    { teams: "Norway 🇳🇴 vs 🏴󠁧󠁢󠁥󠁮󠁧󠁿 England", group: "Quarter-finals", time: "2026-07-11T21:00:00Z" }, // রাত ৩:০০ টা
    { teams: "Argentina 🇦🇷 vs 🇨🇭 Switzerland", group: "Quarter-finals", time: "2026-07-12T01:00:00Z" }, // সকাল ৭:০০ টা

    // --- Wed, Jul 15 ---
    { teams: "France 🇫🇷 vs 🇪🇸 Spain", group: "Semi-finals", time: "2026-07-14T19:00:00Z" }, // রাত ১:০০ টা

    // --- Thu, Jul 16 ---
    { teams: "England 🏴󠁧󠁢󠁥󠁮󠁧󠁿 vs 🇦🇷 Argentina", group: "Semi-finals", time: "2026-07-15T19:00:00Z" } // রাত ১:০০ টা
];

let liveMatchIndex = 0;

function getLocalTimeDetails(isoString) {
    const dateObj = new Date(isoString);
    const displayTime = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
    const displayDate = dateObj.toLocaleDateString([], { month: 'short', day: 'numeric', weekday: 'short' });
    return { displayTime, displayDate, dateObj };
}

function renderSchedule() {
    const listContainer = document.getElementById("schedule-list");
    if (!listContainer) return;
    listContainer.innerHTML = "";

    const now = new Date();
    const nowTime = now.getTime();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

    matches.forEach(match => {
        const local = getLocalTimeDetails(match.time);
        const matchTime = local.dateObj.getTime();
        const matchEndTime = matchTime + (120 * 60 * 1000); 

        const matchDayStart = new Date(local.dateObj.getFullYear(), local.dateObj.getMonth(), local.dateObj.getDate()).getTime();
        if (matchDayStart < todayStart) {
            return; 
        }

        let statusText = "SCHEDULED";
        if (nowTime >= matchTime && nowTime <= matchEndTime) {
            statusText = "LIVE NOW";
        } else if (nowTime > matchEndTime) {
            statusText = "ENDED";
        }

        listContainer.innerHTML += `
            <div class="match-card" style="opacity: ${statusText === 'ENDED' ? '0.4' : '1'}">
                <div>
                    <div class="match-name">${match.teams}</div>
                    <div class="match-group">${match.group}</div>
                </div>
                <div class="time-box" style="border-color: ${statusText === 'LIVE NOW' ? '#E11D48' : 'rgba(255,255,255,0.07)'}">
                    <span class="status" style="color: ${statusText === 'LIVE NOW' ? '#E11D48' : (statusText === 'ENDED' ? '#666' : '#aaaaaa')}">${statusText}</span>
                    <span class="time">${local.displayTime}</span>
                    <span class="date">${local.displayDate}</span>
                </div>
            </div>
        `;
    });
}

function updateLiveSystem() {
    const now = new Date().getTime();
    let currentLiveMatches = [];
    let nextUpcomingMatch = null;

    for (let i = 0; i < matches.length; i++) {
        const matchTime = new Date(matches[i].time).getTime();
        const matchEndTime = matchTime + (120 * 60 * 1000);

        if (now >= matchTime && now <= matchEndTime) {
            currentLiveMatches.push(matches[i]);
        }
    }

    if (currentLiveMatches.length === 0) {
        for (let i = 0; i < matches.length; i++) {
            const matchTime = new Date(matches[i].time).getTime();
            if (matchTime > now) {
                nextUpcomingMatch = matches[i];
                break;
            }
        }
    }

    const liveBanner = document.getElementById("live-banner");
    const upcomingBanner = document.getElementById("upcoming-banner");

    if (currentLiveMatches.length > 0) {
        upcomingBanner.style.display = "none";
        liveBanner.style.display = "block";
        
        if (liveMatchIndex >= currentLiveMatches.length) {
            liveMatchIndex = 0;
        }
        
        const activeLiveMatch = currentLiveMatches[liveMatchIndex];
        document.getElementById("live-teams").innerText = activeLiveMatch.teams;
        document.getElementById("live-status-text").innerText = `${activeLiveMatch.group} • Live Streaming Active`;
        
        if (currentLiveMatches.length > 1) {
            document.getElementById("live-meta").innerText = `Live Match ${liveMatchIndex + 1} of ${currentLiveMatches.length}`;
        } else {
            document.getElementById("live-meta").innerText = "FIFA World Cup 2026";
        }
    } 
    else if (nextUpcomingMatch) {
        liveBanner.style.display = "none";
        upcomingBanner.style.display = "block";
        
        const local = getLocalTimeDetails(nextUpcomingMatch.time);
        document.getElementById("upcoming-teams").innerText = nextUpcomingMatch.teams;
        document.getElementById("upcoming-details").innerText = `${nextUpcomingMatch.group} • ${local.displayDate} at ${local.displayTime}`;

        const diff = new Date(nextUpcomingMatch.time).getTime() - now;
        
        // দিন, ঘণ্টা, মিনিট ও সেকেন্ড ক্যালকুলেশন
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        // ২৪ ঘণ্টার বেশি বাকি থাকলে দিন সহ দেখাবে
        if (days > 0) {
            document.getElementById("countdown-text").innerText = `Starts in: ${days}d ${hours}h ${minutes}m`;
        } else {
            // ২৪ ঘণ্টার কম সময় থাকলে স্বাভাবিকভাবে ঘণ্টা, মিনিট ও সেকেন্ড শো করবে
            document.getElementById("countdown-text").innerText = `Starts in: ${hours}h ${minutes}m ${seconds}s`;
        }
    } else {
        liveBanner.style.display = "none";
        upcomingBanner.style.display = "none";
    }
}

setInterval(() => {
    liveMatchIndex++;
}, 5000);

renderSchedule();
setInterval(updateLiveSystem, 1000);
setInterval(renderSchedule, 60000); 
updateLiveSystem();
</script>

</body>
</html>
